##
## Vaultrix Configuration File
##

## Server Configuration
server:
  address: "0.0.0.0"
  port: 8200
  tls:
    enabled: true
    cert_file: "/path/to/certificate.pem"
    key_file: "/path/to/key.pem"

## Storage Configuration
storage:
  # "file" or "postgres"
  type: "file"
  path: "/var/lib/securevault/data"

## Authentication Configuration
auth:
  token_ttl: "24h"

## Seal Configuration
## Controls Shamir's Secret Sharing parameters for the master key
seal:
  # Number of key shares to generate during initialization
  secret_shares: 5
  # Minimum number of key shares required to unseal
  secret_threshold: 3

## Rate Limiting
rate_limit:
  enabled: true
  # Maximum sustained requests per second
  requests_per_sec: 100
  # Maximum burst size
  burst: 200

## Audit Logging
audit:
  enabled: true
  # Path to the audit log file
  path: "/var/log/securevault/audit.log"

## Replication Configuration
replication:
  # "standalone", "leader", or "follower"
  mode: "standalone"
  cluster_addr: "10.0.1.4:8201"
  peers:
    - "10.0.1.5:8201"
    - "10.0.1.6:8201"
  # Shared secret for authenticating replication traffic between nodes
  shared_secret: "change-me-to-a-strong-random-value"

## Logging Configuration
logging:
  level: "info"
  format: "json"
