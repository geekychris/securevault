server:
  address: "0.0.0.0"
  port: 8200
  tls:
    enabled: false

storage:
  type: "file"
  path: "/vault/data"

auth:
  token_ttl: "8h"

seal:
  secret_shares: 1
  secret_threshold: 1

rate_limit:
  enabled: false

audit:
  enabled: true
  path: "/vault/audit/audit.log"

replication:
  mode: "follower"
  cluster_addr: "172.28.0.11:8201"
  peers:
    - "172.28.0.10:8201"
  shared_secret: "cluster-replication-secret-change-in-production"
