server:
  address: "127.0.0.1"
  port: 8200
  tls:
    enabled: false  # Disable TLS for development

storage:
  type: "file"
  path: "./data"

auth:
  token_ttl: "24h"

seal:
  secret_shares: 1       # Single key for easy dev workflow
  secret_threshold: 1

rate_limit:
  enabled: false          # Disable rate limiting in dev

audit:
  enabled: true
  path: "./data/audit/audit.log"

replication:
  mode: "standalone"
